<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FlexTools | Private PDF Editor, OCR & Utility Suite</title>
    
    <meta name="description" content="100% Private Utility Suite. Edit PDFs, Convert Image to Word, and track live Currency rates locally.">
    <meta name="keywords" content="PDF Editor, Image to Word, OCR, Currency Converter, USD to NGN, GHS to USD, Image to PDF, Online Doc Editor">
    <meta name="author" content="FlexTools Pro">
    <link rel="icon" type="image/x-icon" href="image/FlexTools logo with vibrant colors.png">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "FlexTools Pro",
      "url": "https://flextools.pro",
      "description": "Free private tools to edit PDFs, convert images to Word, and track exchange rates locally.",
      "applicationCategory": "UtilityApplication",
      "featureList": "Live PDF Editor, Image to Word OCR, Currency Converter, Docx Editor, Image to PDF",
      "offers": { "@type": "Offer", "price": "0" }
    }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo-wrap">
            <img src="image/FlexTools logo with vibrant colors.png" alt="FlexTools Logo" class="main-logo">
        </div>
        
        <nav class="nav-list">
            <div class="nav-group">Financial & Units</div>
            <button class="nav-item active" onclick="showTool('currency', this)"><span>💰</span> Converter</button>
            <button class="nav-item" onclick="showTool('unit-converter', this)"><span>📏</span> Unit Conv</button>
            
            <div class="nav-group">Image Processing</div>
            <button class="nav-item" onclick="showTool('word', this)"><span>📝</span> Img to Word</button>
            <button class="nav-item" onclick="showTool('img-compressor', this)"><span>📉</span> Compress</button>
            <button class="nav-item" onclick="showTool('img-resizer', this)"><span>📐</span> Resize</button>
            
            <div class="nav-group">PDF & Docs</div>
            <button class="nav-item" onclick="showTool('pdf-editor', this)"><span>🖋️</span> PDF Editor</button>
            <button class="nav-item" onclick="showTool('pdf-merge', this)"><span>🔗</span> Merge PDF</button>
            <button class="nav-item" onclick="showTool('pdf-split', this)"><span>✂️</span> Split PDF</button>
            <button class="nav-item" onclick="showTool('doc-editor', this)"><span>✍️</span> Doc Editor</button>
            <button class="nav-item" onclick="showTool('pdf', this)"><span>📄</span> Img to PDF</button>
            <button class="nav-item" onclick="showTool('file-converter', this)"><span>🔄</span> File Conv</button>
        </nav>
    </aside>

    <main class="workspace">
        <header class="top-bar">
            <div class="status-pill">Secure System</div>
            <a href="https://www.buymeacoffee.com/YOUR_USERNAME" target="_blank" class="bmc-header-btn">
                <img src="https://cdn.buymeacoffee.com/buttons/bmc-new-btn-logo.svg" alt="Buy me a coffee">
                <span>Support Us</span>
            </a>
        </header>

        <div class="content-area">
            <section id="currency" class="tool-card active">
                <span class="pro-badge">Live Exchange</span>
                <h1>Currency Converter</h1>
                <div class="input-group"><label>Amount</label><input type="number" id="currAmount" placeholder="100.00"></div>
                <div class="converter-grid"><div class="input-group"><label>From</label><select id="fromCurrency"></select></div><div class="input-group"><label>To</label><select id="toCurrency"></select></div></div>
                <button class="btn-action" onclick="convertCurrency()">Check Live Rates</button>
                <div id="currResult" class="result-box"></div>
            </section>

            <section id="unit-converter" class="tool-card">
                <h1>Unit Converter</h1>
                <div class="input-group"><label>Value</label><input type="number" id="unitValue" placeholder="0"></div>
                <div class="input-group"><label>Type</label><select id="unitType"><option value="length">Length (M to Ft)</option><option value="weight">Weight (KG to Lb)</option></select></div>
                <button class="btn-action" onclick="convertUnits()">Convert Now</button>
                <div id="unitResult" class="result-box"></div>
            </section>

            <section id="word" class="tool-card">
                <h1>Image to Word</h1>
                <input type="file" id="wordImageInput" accept="image/*">
                <button class="btn-action" onclick="processImageToWord()">Extract Text</button>
            </section>

            <section id="img-compressor" class="tool-card">
                <h1>Image Compressor</h1>
                <input type="file" id="compressInput" accept="image/*">
                <input type="range" id="compressQuality" min="0.1" max="1.0" step="0.1" value="0.7">
                <button class="btn-action" onclick="compressImage()">Compress</button>
            </section>

            <section id="img-resizer" class="tool-card">
                <h1>Image Resizer</h1>
                <input type="file" id="resizerInput" accept="image/*">
                <div style="display:flex; gap:10px;"><input type="number" id="resizeWidth" placeholder="Width"><input type="number" id="resizeHeight" placeholder="Height"></div>
                <button class="btn-action" onclick="resizeImage()">Resize</button>
            </section>

            <section id="pdf-editor" class="tool-card">
                <h1>PDF Text Overlay</h1>
                <input type="file" id="pdfEditInput" accept="application/pdf" onchange="previewPDF()">
                <input type="text" id="pdfTextToAdd" placeholder="Text to add..." oninput="previewPDF()">
                <button class="btn-action" onclick="downloadEditedPDF()">Download</button>
                <iframe id="pdfPreview" style="width:100%; height:300px; margin-top:20px;"></iframe>
            </section>

            <section id="pdf-merge" class="tool-card">
                <h1>Merge PDF</h1>
                <input type="file" id="mergeInput" accept="application/pdf" multiple>
                <button class="btn-action" onclick="mergePDFs()">Merge Files</button>
            </section>

            <section id="pdf-split" class="tool-card">
                <h1>Split PDF</h1>
                <input type="file" id="splitInput" accept="application/pdf">
                <input type="number" id="splitPage" value="1">
                <button class="btn-action" onclick="splitPDF()">Extract Page</button>
            </section>

            <section id="doc-editor" class="tool-card">
                <h1>Doc Editor</h1>
                <input type="file" id="importDoc" accept=".docx" onchange="importWordFile(this)">
                <div id="editor-container" style="height: 250px; margin: 15px 0;"></div>
                <button class="btn-action" onclick="downloadDocAsWord()">Export Word</button>
            </section>

            <section id="pdf" class="tool-card">
                <h1>Image to PDF</h1>
                <input type="file" id="pdfImageInput" accept="image/*">
                <button class="btn-action" onclick="downloadPDF()">Convert</button>
            </section>

            <section id="file-converter" class="tool-card">
                <h1>Format Converter</h1>
                <input type="file" id="fileConvInput" accept="image/*">
                <select id="fileToFormat"><option value="image/png">PNG</option><option value="image/jpeg">JPG</option></select>
                <button class="btn-action" onclick="convertFile()">Convert</button>
            </section>
        </div>
    </main>

    <script src="main.js"></script>
    <script src="sw.js"></script>
    <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }</script>
</body>
</html>
